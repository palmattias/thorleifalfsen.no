<html lang="nb">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --color-bg: #fafaf8;
      --color-text: #1a1a1a;
      --color-text-secondary: #555;
      --color-accent: #2c3e5a;
      --color-border: #ddd;
      --color-quote-bg: #f0f0ec;
      --font-body: 'Source Serif 4', 'Georgia', serif;
      --font-heading: 'Inter', 'Helvetica Neue', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: var(--font-heading); color: var(--color-text); background: var(--color-bg); }

    /* — Layout — */
    .page-wrap { display: flex; flex-direction: column; height: 100vh; }

    /* — Nav — */
    .site-nav {
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      padding: 0.7rem 1.5rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }
    .site-nav a { color: var(--color-text-secondary); text-decoration: none; }
    .site-nav a:hover, .site-nav a.active { color: var(--color-accent); }

    /* — Map area — */
    .map-area { flex: 1; position: relative; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    /* — Ship selector (horizontal strip) — */
    .ship-strip {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 1000;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .ship-strip::-webkit-scrollbar { display: none; }
    .ship-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      border: none;
      border-radius: 20px;
      font-family: var(--font-heading);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      background: var(--color-bg);
      color: var(--color-text-secondary);
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .ship-btn:hover { background: #fff; color: var(--color-text); }
    .ship-btn.active { background: var(--color-accent); color: #fff; }
    .ship-btn.torpedert.active { background: #c0392b; }

    /* — Info panel (bottom sheet) — */
    .info-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: #fff;
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -2px 20px rgba(0,0,0,0.12);
      transform: translateY(100%);
      transition: transform 0.3s ease;
      max-height: 70vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .info-panel.visible { transform: translateY(0); }

    .info-panel-handle {
      width: 36px;
      height: 4px;
      background: #ccc;
      border-radius: 2px;
      margin: 10px auto 0;
    }
    .info-panel-close {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--color-text-secondary);
      line-height: 1;
      padding: 4px 8px;
    }
    .info-panel-content {
      padding: 1.2rem 1.5rem 1.5rem;
    }
    .info-panel-ship {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }
    .info-panel-period {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.8rem;
    }
    .info-panel-badge {
      display: inline-block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 8px;
      border-radius: 2px;
      margin-bottom: 1rem;
    }
    .badge-torpedert { background: #c0392b; color: #fff; }
    .badge-marine { background: var(--color-accent); color: #fff; }
    .badge-handel { background: #7f8c8d; color: #fff; }
    .badge-land { background: #95a5a6; color: #fff; }
    .info-panel-detail {
      font-family: var(--font-body);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    /* — Point info (when clicking a specific marker) — */
    .info-panel-point {
      background: var(--color-quote-bg);
      padding: 0.8rem 1rem;
      border-radius: 4px;
      margin-top: 0.5rem;
    }
    .info-panel-point-name {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
    }
    .info-panel-point-text {
      font-family: var(--font-body);
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--color-text-secondary);
    }

    /* — Stops list inside panel — */
    .stops-list {
      list-style: none;
      margin-top: 1rem;
      border-top: 1px solid var(--color-border);
      padding-top: 0.8rem;
    }
    .stops-list li {
      padding: 0.5rem 0;
      font-size: 0.85rem;
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      cursor: pointer;
      border-radius: 4px;
      padding-left: 0.3rem;
    }
    .stops-list li:hover {
      background: var(--color-quote-bg);
    }
    .stop-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.3rem;
    }
    .stop-name { flex: 1; line-height: 1.4; }

    /* — Desktop: panel on the left side — */
    @media (min-width: 800px) {
      .info-panel {
        top: 12px;
        bottom: 12px;
        left: 12px;
        right: auto;
        width: 380px;
        border-radius: 12px;
        max-height: none;
        transform: translateX(-110%);
      }
      .info-panel.visible { transform: translateX(0); }
      .info-panel-handle { display: none; }
      .ship-strip {
        left: 400px;
      }
      .info-panel.visible ~ .ship-strip {
        left: 400px;
      }
    }

    /* — Dark mode — */
    [data-theme="dark"] {
      --color-bg: #1a1a1a;
      --color-text: #e0ddd8;
      --color-text-secondary: #a0a0a0;
      --color-accent: #7da0ca;
      --color-border: #333;
      --color-quote-bg: #252525;
    }
    [data-theme="dark"] .info-panel { background: #222; }
    [data-theme="dark"] .ship-btn { background: #222; color: #a0a0a0; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
    [data-theme="dark"] .ship-btn:hover { background: #333; color: #e0ddd8; }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --color-bg: #1a1a1a;
        --color-text: #e0ddd8;
        --color-text-secondary: #a0a0a0;
        --color-accent: #7da0ca;
        --color-border: #333;
        --color-quote-bg: #252525;
      }
      :root:not([data-theme="light"]) .info-panel { background: #222; }
      :root:not([data-theme="light"]) .ship-btn { background: #222; color: #a0a0a0; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
      :root:not([data-theme="light"]) .ship-btn:hover { background: #333; color: #e0ddd8; }
    }
    .theme-toggle {
      background: none; border: none; cursor: pointer;
      font-size: 1rem; padding: 0.2rem 0.4rem;
      color: var(--color-text-secondary); transition: color 0.2s; line-height: 1;
    }
    .theme-toggle:hover { color: var(--color-accent); }

    /* — Leaflet popup override — */
    .leaflet-popup-content-wrapper {
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .leaflet-popup-content {
      font-family: var(--font-heading);
      font-size: 0.85rem;
      line-height: 1.5;
      margin: 10px 14px;
    }
  </style>
  <script>var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);</script>

const typeColors = { handel: '#7f8c8d', marine: '#2c3e5a', torpedert: '#c0392b', land: '#95a5a6' };
const typeBadge = { handel: 'Handelsflåten', marine: 'Marinen', torpedert: 'Torpedert', land: 'På land' };

const map = L.map('map', { zoomControl: true }).setView([54, -10], 4);

function isDarkMode() {
  const theme = document.documentElement.getAttribute('data-theme');
  if (theme === 'dark') return true;
  if (theme === 'light') return false;
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}

const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 16
});
const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 16
});

(isDarkMode() ? darkTiles : lightTiles).addTo(map);

let activeRoutes = [];
let activeMarkers = [];
let currentVoyage = null;

const panel = document.getElementById('infoPanel');
const panelContent = document.getElementById('infoPanelContent');
const closeBtn = document.getElementById('closePanel');

closeBtn.addEventListener('click', () => panel.classList.remove('visible'));

function clearMap() {
  activeRoutes.forEach(r => map.removeLayer(r));
  activeMarkers.forEach(m => map.removeLayer(m));
  activeRoutes = [];
  activeMarkers = [];
}

function showPointInfo(voyage, point) {
  const badgeClass = voyage.type === 'torpedert' ? 'badge-torpedert' :
                     voyage.type === 'marine' ? 'badge-marine' :
                     voyage.type === 'land' ? 'badge-land' : 'badge-handel';

  let stopsHtml = '<ul class="stops-list">';
  voyage.points.forEach((p, i) => {
    const dotColor = p.name.includes('TORPEDERT') || p.name.includes('GRUNNSTØTT') ? '#c0392b' : typeColors[voyage.type];
    const isActive = p === point;
    stopsHtml += `<li onclick="flyToPoint(${i})" style="${isActive ? 'background:var(--color-quote-bg);' : ''}">
      <span class="stop-dot" style="background:${dotColor};"></span>
      <span class="stop-name">${p.name.split('—')[0].split('–')[0].trim()}</span>
    </li>`;
  });
  stopsHtml += '</ul>';

  panelContent.innerHTML = `
    <div class="info-panel-ship">${voyage.ship}</div>
    <div class="info-panel-period">${voyage.period} &middot; ${voyage.role}</div>
    <span class="info-panel-badge ${badgeClass}">${typeBadge[voyage.type]}</span>
    ${point ? `<div class="info-panel-point">
      <div class="info-panel-point-name">${point.name}</div>
      <div class="info-panel-point-text">${point.text}</div>
    </div>` : `<div class="info-panel-detail">${voyage.summary}</div>`}
    ${stopsHtml}
  `;
  panel.classList.add('visible');
}

window.flyToPoint = function(index) {
  if (!currentVoyage) return;
  const p = currentVoyage.points[index];
  map.setView([p.lat, p.lng], 7, { animate: true });
  showPointInfo(currentVoyage, p);
  // Open the marker popup too
  activeMarkers.forEach(m => {
    if (m.getLatLng().lat === p.lat && m.getLatLng().lng === p.lng) {
      m.openPopup();
    }
  });
};

function showVoyage(voyage, openPanel) {
  clearMap();
  currentVoyage = voyage;
  const color = typeColors[voyage.type];

  voyage.routes.forEach(route => {
    const line = L.polyline(route, {
      color: color, weight: 2.5, opacity: 0.6,
      dashArray: voyage.type === 'land' ? '5,8' : null
    }).addTo(map);
    activeRoutes.push(line);
  });

  const bounds = [];
  voyage.points.forEach((pt, i) => {
    const isTorpedo = pt.name.includes('TORPEDERT') || pt.name.includes('GRUNNSTØTT');
    const isFirst = i === 0;
    const isLast = i === voyage.points.length - 1;
    let radius = 5, fillColor = color;
    if (isTorpedo) { radius = 9; fillColor = '#c0392b'; }
    else if (isFirst || isLast) { radius = 7; }

    const marker = L.circleMarker([pt.lat, pt.lng], {
      radius, fillColor, color: '#fff', weight: 2, fillOpacity: 0.9
    }).addTo(map);

    marker.bindPopup(`<strong>${pt.name.replace('\n','<br>')}</strong>`);
    marker.on('click', () => {
      showPointInfo(voyage, pt);
    });

    activeMarkers.push(marker);
    bounds.push([pt.lat, pt.lng]);
  });

  if (bounds.length > 1) map.fitBounds(bounds, { padding: [60, 60], maxZoom: 7 });
  else if (bounds.length === 1) map.setView(bounds[0], 6);

  // Update buttons
  document.querySelectorAll('.ship-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + voyage.id);
  if (btn) btn.classList.add('active');

  if (openPanel !== false) showPointInfo(voyage, null);
}

// Build ship buttons
const strip = document.getElementById('shipStrip');
voyages.forEach(v => {
  const btn = document.createElement('button');
  btn.className = 'ship-btn' + (v.type === 'torpedert' ? ' torpedert' : '');
  btn.id = 'btn-' + v.id;
  btn.textContent = v.ship;
  btn.addEventListener('click', () => showVoyage(v));
  strip.appendChild(btn);
});

// Close panel on map click (mobile)
map.on('click', (e) => {
  if (e.originalEvent.target === map.getContainer() || e.originalEvent.target.classList.contains('leaflet-tile')) {
    panel.classList.remove('visible');
  }
});

// Show Navarra by default
showVoyage(voyages[1]);

// Theme toggle
(function() {
  const toggle = document.getElementById('themeToggle');
  const root = document.documentElement;
  const saved = localStorage.getItem('theme');
  if (saved) root.setAttribute('data-theme', saved);

  function updateIcon() {
    const dark = isDarkMode();
    toggle.innerHTML = dark ? '&#9788;' : '&#9790;';
    toggle.setAttribute('aria-label', dark ? 'Bytt til lys modus' : 'Bytt til mørk modus');
  }

  function updateTiles() {
    if (isDarkMode()) {
      if (map.hasLayer(lightTiles)) map.removeLayer(lightTiles);
      if (!map.hasLayer(darkTiles)) darkTiles.addTo(map);
    } else {
      if (map.hasLayer(darkTiles)) map.removeLayer(darkTiles);
      if (!map.hasLayer(lightTiles)) lightTiles.addTo(map);
    }
  }

  toggle.addEventListener('click', function() {
    const next = isDarkMode() ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateIcon();
    updateTiles();
  });

  updateIcon();
  updateTiles();
})();
</script>
